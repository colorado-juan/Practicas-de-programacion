<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="assets/styles/styles_login.css">
</head>
<body>
    
    <main class="login-container">
            <section class="login-card">

                <div class="login-header">
                    <h1>Iniciar sesión</h1>
                    <p>Por favor, introducir tus credenciales</p>
                </div>

                <form id="loginForm" class="login-form">

                    <div class="input-group">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" autocomplete="email" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" autocomplete="current-password" required>
                    </div>

                    <div class="options">
                        <label class="checkbox">
                        <input type="checkbox" id="showPassword">
                        <span>Mostrar contraseña</span>
                        </label>

                        <a href="#" class="forgot-link">¿olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn-login">Iniciar sesión</button>

                    <p id="message" class="message"></p>

                </form>
            </section>
    </main>

</body>
</html>
